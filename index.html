<!doctype html>
<html lang="en" data-theme="eink" data-view="editor">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>therefore — a text editor</title>
<meta name="description" content="therefore is a native text editor written in Rust and configured in Lua.">
<style>
  @font-face {
    font-family:"JetBrains Mono";
    src:url("assets/fonts/JetBrainsMono-Regular.ttf") format("truetype");
    font-weight:400; font-style:normal; font-display:swap;
  }
  @font-face {
    font-family:"JetBrains Mono";
    src:url("assets/fonts/JetBrainsMono-Bold.ttf") format("truetype");
    font-weight:600 700; font-style:normal; font-display:swap;
  }

  :root[data-theme="eink"]  { --bg:#f7f6f2; --fg:#23211e; --dim:#8a867e; --border:#c8c4ba; --panel:#eceae4; }
  :root[data-theme="space"] { --bg:#0b0e18; --fg:#c9cde4; --dim:#6b7290; --border:#2a3150; --panel:#121624; }

  * { box-sizing:border-box; }
  html, body { height:100%; }
  html { -webkit-text-size-adjust:100%; }
  body {
    margin:0; background:var(--bg); color:var(--fg);
    font-family:"JetBrains Mono",ui-monospace,"SF Mono",Consolas,monospace;
    font-size:15px; line-height:1.7;
    -webkit-font-smoothing:antialiased;
    transition:background .2s ease, color .2s ease;
  }

  .wrap {
    width:100%; height:100%; margin:0 auto; padding:0 24px;
    display:flex; flex-direction:column; min-height:0;
  }

  header {
    flex:none; display:flex; align-items:center; justify-content:space-between; padding:20px 0 0;
  }
  .brand { display:flex; align-items:baseline; gap:.5rem; text-decoration:none; color:inherit; }
  .brand .sym { color:var(--dim); letter-spacing:.15em; }
  .brand .name { font-size:1.05rem; }
  .toggle {
    background:none; border:1px solid var(--border); color:var(--dim);
    font-family:inherit; font-size:.72rem; letter-spacing:.05em;
    padding:.3rem .55rem; border-radius:3px; cursor:pointer;
  }
  .toggle:hover { color:var(--fg); border-color:var(--dim); }

  .head { flex:none; }
  h1 { font-weight:600; font-size:2rem; margin:16px 0 .5rem; letter-spacing:-.01em; }
  h1 .sym { color:var(--dim); font-weight:400; }
  .intro { font-size:1.02rem; line-height:1.55; margin:0; max-width:66ch; }

  /* Tabs to switch which screenshot fills the stage. */
  .tabs { flex:none; display:flex; gap:2px; margin:18px 0 0; }
  .tab {
    background:none; border:none; border-bottom:2px solid transparent;
    color:var(--dim); font-family:inherit; font-size:.9rem; cursor:pointer;
    padding:.4rem .1rem; margin-right:1.4rem;
  }
  .tab:hover { color:var(--fg); }
  :root[data-view="editor"] .tab[data-view="editor"],
  :root[data-view="git"]    .tab[data-view="git"] {
    color:var(--fg); border-bottom-color:var(--fg);
  }

  /* One big image, scaled to fill the space it's given. */
  .stage {
    flex:1 1 auto; min-height:0; position:relative; margin:14px 0 18px;
  }
  .stage img {
    position:absolute; inset:0; margin:auto;
    max-width:100%; max-height:100%; width:auto; height:auto;
    border:1px solid var(--border); border-radius:6px;
    opacity:0; transition:opacity .22s ease;
  }
  :root[data-theme="eink"][data-view="editor"]  .s-eink-editor,
  :root[data-theme="eink"][data-view="git"]     .s-eink-git,
  :root[data-theme="space"][data-view="editor"] .s-space-editor,
  :root[data-theme="space"][data-view="git"]    .s-space-git { opacity:1; }

  .closing { flex:none; margin:0 0 20px; color:var(--dim); font-size:1rem; }

  /* Narrow screens: let it breathe and scroll instead of squeezing to fit. */
  @media (max-width:760px) {
    html, body { height:auto; }
    .wrap { height:auto; }
    .stage { height:auto; }
    .stage img {
      position:static; opacity:0; width:100%; max-height:none; display:none;
    }
    :root[data-theme="eink"][data-view="editor"]  .s-eink-editor,
    :root[data-theme="eink"][data-view="git"]     .s-eink-git,
    :root[data-theme="space"][data-view="editor"] .s-space-editor,
    :root[data-theme="space"][data-view="git"]    .s-space-git { opacity:1; display:block; }
    h1 { font-size:1.8rem; }
    .closing { margin:26px 0 50px; }
  }
</style>
</head>
<body>
  <div class="wrap">

    <header>
      <a class="brand" href="/"><span class="sym">&#8756;</span><span class="name">therefore</span></a>
      <button class="toggle" id="toggle">space</button>
    </header>

    <div class="head">
      <h1>therefore <span class="sym">&#8756;</span></h1>
      <p class="intro">A text editor. Native, written in Rust, configured in Lua. Runs on Windows, macOS and Linux.</p>
    </div>

    <div class="tabs" role="tablist">
      <button class="tab" data-view="editor" role="tab">editor</button>
      <button class="tab" data-view="git" role="tab">git</button>
    </div>

    <div class="stage">
      <img class="s-eink-editor"  src="assets/shots/eink_editor.png"  alt="The therefore editor.">
      <img class="s-eink-git"     src="assets/shots/eink_git.png"     alt="The therefore git window.">
      <img class="s-space-editor" src="assets/shots/space_editor.png" alt="The therefore editor.">
      <img class="s-space-git"    src="assets/shots/space_git.png"    alt="The therefore git window.">
    </div>

    <p class="closing">Nothing else to explain. Designed to work.</p>

  </div>

<script>
  (function () {
    var root = document.documentElement;

    // Theme
    var btn = document.getElementById("toggle"), saved = null;
    try { saved = localStorage.getItem("therefore-theme"); } catch (e) {}
    if (!saved && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) saved = "space";
    if (saved) root.setAttribute("data-theme", saved);
    function themeLabel() { btn.textContent = root.getAttribute("data-theme") === "space" ? "eink" : "space"; }
    themeLabel();
    btn.addEventListener("click", function () {
      var next = root.getAttribute("data-theme") === "space" ? "eink" : "space";
      root.setAttribute("data-theme", next);
      try { localStorage.setItem("therefore-theme", next); } catch (e) {}
      themeLabel();
    });

    // View switch (editor / git)
    var views = ["editor", "git"];
    function setView(v) { root.setAttribute("data-view", v); }
    document.querySelectorAll(".tab").forEach(function (t) {
      t.addEventListener("click", function () { setView(t.getAttribute("data-view")); });
    });
    document.addEventListener("keydown", function (e) {
      if (e.key !== "ArrowLeft" && e.key !== "ArrowRight") return;
      var cur = views.indexOf(root.getAttribute("data-view"));
      setView(views[(cur + (e.key === "ArrowRight" ? 1 : views.length - 1)) % views.length]);
    });
  })();
</script>
</body>
</html>
