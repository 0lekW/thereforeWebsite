<!doctype html>
<html lang="en" data-theme="eink" data-front="editor">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>therefore</title>
<meta name="description" content="therefore is a native text editor written in Rust and configured in Lua.">
<style>
  @font-face {
    font-family:"JetBrains Mono";
    src:url("assets/fonts/JetBrainsMono-Regular.ttf") format("truetype");
    font-weight:400; font-style:normal; font-display:swap;
  }
  @font-face {
    font-family:"JetBrains Mono";
    src:url("assets/fonts/JetBrainsMono-Bold.ttf") format("truetype");
    font-weight:600 700; font-style:normal; font-display:swap;
  }

  :root[data-theme="eink"]  { --bg:#f7f6f2; --fg:#23211e; --dim:#8a867e; --border:#c8c4ba; --panel:#eceae4; --shadow:rgba(40,36,30,.18); }
  :root[data-theme="space"] { --bg:#0b0e18; --fg:#c9cde4; --dim:#6b7290; --border:#2a3150; --panel:#121624; --shadow:rgba(0,0,0,.45); }

  * { box-sizing:border-box; }
  html, body { height:100%; }
  html { -webkit-text-size-adjust:100%; }
  body {
    margin:0; background:var(--bg); color:var(--fg);
    font-family:"JetBrains Mono",ui-monospace,"SF Mono",Consolas,monospace;
    font-size:15px; line-height:1.7;
    -webkit-font-smoothing:antialiased;
    transition:background .2s ease, color .2s ease;
    -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none;
  }
  img { -webkit-user-drag:none; user-drag:none; }

  /* Centered middle-width column. */
  .wrap {
    width:100%; max-width:1200px; height:100%; margin:0 auto; padding:0 28px;
    display:flex; flex-direction:column; min-height:0;
  }

  header { flex:none; display:flex; align-items:center; justify-content:space-between; padding:20px 0 0; }
  .brand { display:flex; align-items:baseline; gap:.5rem; text-decoration:none; color:inherit; }
  .brand .sym { color:var(--dim); letter-spacing:.15em; }
  .brand .name { font-size:1.05rem; }
  .toggle {
    background:none; border:1px solid var(--border); color:var(--dim);
    font-family:inherit; font-size:.72rem; letter-spacing:.05em;
    padding:.3rem .55rem; border-radius:3px; cursor:pointer;
  }
  .toggle:hover { color:var(--fg); border-color:var(--dim); }

  .head { flex:none; }
  h1 { font-weight:600; font-size:2rem; margin:16px 0 .5rem; letter-spacing:-.01em; }
  h1 .sym { color:var(--dim); font-weight:400; }
  .intro { font-size:1.02rem; line-height:1.55; margin:0; }

  /* Per-OS downloads, between the title block and the screenshot. */
  .downloads {
    flex:none; display:flex; align-items:center; flex-wrap:wrap;
    gap:.4rem 1.5rem; margin:20px 0 0;
  }
  .downloads .label {
    color:var(--dim); font-size:.78rem; letter-spacing:.09em; text-transform:uppercase;
  }
  .downloads .dl {
    display:inline-flex; align-items:center; gap:.5rem; font-size:.95rem;
  }
  .downloads .ico { width:15px; height:15px; fill:currentColor; flex:none; }

  /* Available (Windows): a real link. */
  .downloads a.dl {
    color:var(--fg); text-decoration:none;
    border-bottom:1px solid var(--border); padding-bottom:2px;
  }
  .downloads a.dl:hover { border-bottom-color:var(--fg); }

  /* Not yet built (macOS, Linux): greyed, with a tooltip on hover. */
  .downloads .dl.soon { color:var(--dim); cursor:default; position:relative; }
  .downloads .dl.soon .tip {
    position:absolute; left:50%; bottom:calc(100% + 9px);
    transform:translateX(-50%) translateY(4px);
    background:var(--fg); color:var(--bg);
    font-size:.72rem; letter-spacing:.03em; white-space:nowrap;
    padding:.3rem .55rem; border-radius:4px;
    opacity:0; pointer-events:none;
    transition:opacity .14s ease, transform .14s ease;
  }
  .downloads .dl.soon .tip::after {
    content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%);
    border:5px solid transparent; border-top-color:var(--fg);
  }
  .downloads .dl.soon:hover .tip { opacity:1; transform:translateX(-50%) translateY(0); }

  /* The card stack. Click (or arrow keys) brings the back card to the front.
     The stage takes the image's aspect ratio so it hugs the image with no
     dead space; the leftover height stays as plain background around it. */
  .stagearea {
    flex:1 1 0; min-height:0; margin:14px 0 10px;
    display:flex; align-items:center; justify-content:center;
  }
  .stage {
    position:relative; cursor:pointer; outline:none;
    max-width:100%; max-height:100%;   /* exact size set by JS to hug the image */
  }
  .card {
    position:absolute; inset:0;
    transition:transform .5s cubic-bezier(.2,.75,.2,1), opacity .4s ease, filter .4s ease;
    will-change:transform;
  }
  .card img {
    display:none; width:100%; height:100%; object-fit:contain;
    border:1px solid var(--border); border-radius:6px;
    box-shadow:0 14px 40px var(--shadow);
  }
  :root[data-theme="eink"]  .card img.t-eink,
  :root[data-theme="space"] .card img.t-space { display:block; }

  .badge {
    position:absolute; top:10px; left:12px;
    font-size:.72rem; letter-spacing:.06em;
    color:var(--fg); background:var(--panel);
    border:1px solid var(--border); border-radius:3px;
    padding:.12rem .5rem; opacity:.9;
  }

  /* Front card: centered, on top. Back card: nudged out behind, dimmed. */
  :root[data-front="editor"] .card[data-view="editor"],
  :root[data-front="git"]    .card[data-view="git"] {
    transform:translate(0,0) rotate(0) scale(1); z-index:2;
  }
  :root[data-front="editor"] .card[data-view="git"],
  :root[data-front="git"]    .card[data-view="editor"] {
    transform:translate(34px,34px) rotate(1.8deg) scale(.98);
    z-index:1; opacity:.55; filter:saturate(.85);
  }
  /* Only the front card's badge stays fully lit. */
  :root[data-front="editor"] .card[data-view="git"] .badge,
  :root[data-front="git"]    .card[data-view="editor"] .badge { opacity:.75; }

  .hint { flex:none; margin:0 0 8px; color:var(--dim); font-size:.82rem; }
  .closing { flex:none; margin:0 0 72px; color:var(--dim); font-size:1rem; }

  /* Narrow screens: drop the stack trick, show both stacked and scroll. */
  @media (max-width:760px) {
    html, body { height:auto; }
    .wrap { height:auto; }
    .stagearea { display:block; flex:none; margin:22px 0 0; }
    .stage { position:static; height:auto; aspect-ratio:auto; max-width:none; cursor:default; }
    .card { position:static; transform:none!important;
            opacity:1!important; filter:none!important; margin-bottom:18px; }
    .card img { width:100%; height:auto; }
    .badge { top:8px; left:10px; }
    .hint { display:none; }
    h1 { font-size:1.8rem; }
    .closing { margin:26px 0 50px; }
  }
</style>
</head>
<body>
  <div class="wrap">

    <header>
      <a class="brand" href="/"><span class="sym">&#8756;</span><span class="name">therefore</span></a>
      <button class="toggle" id="toggle">space</button>
    </header>

    <div class="head">
      <h1>therefore <span class="sym">&#8756;</span></h1>
      <p class="intro">A text editor with version control built in. Native, written in Rust, configured in Lua.<br>
      Runs on Windows, macOS and Linux.</p>
    </div>

    <div class="downloads">
      <span class="label">download</span>

      <a class="dl" href="downloads/therefore-3.1.1-windows-x64-setup.exe" download data-os="windows">
        <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="2" y="2" width="9" height="9"/><rect x="13" y="2" width="9" height="9"/>
          <rect x="2" y="13" width="9" height="9"/><rect x="13" y="13" width="9" height="9"/>
        </svg>
        <span>windows</span>
      </a>

      <span class="dl soon" data-os="macos">
        <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.037 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701"/>
        </svg>
        <span>macOS</span>
        <span class="tip">Coming Soon!</span>
      </span>

      <span class="dl soon" data-os="linux">
        <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M14.62 8.35c-.42.28-1.75 1.04-1.95 1.19-.39.29-.75.15-.9-.06-.19-.25-.13-.6-.13-.9 0-.31.09-.46.24-.63.6-.66.9-1.05 1.05-1.35.15-.29.09-.6-.06-.79-.15-.19-.45-.24-.75-.09z"/>
          <path d="M12.5 2c-2.2 0-3.6 1.7-3.6 4.2 0 1.4.3 2.2.3 3.2 0 .9-.6 1.6-1.2 2.4-.7.9-1.5 1.9-2 3.1-.3.7-.4 1.4-.3 2 0 .1-.1.2-.1.3-.2.2-.4.5-.6.7-.2.2-.5.3-.8.4-.3.1-.6.3-.7.6-.1.2 0 .5 0 .7 0 .3.1.5 0 .7-.2.6-.2.9-.1 1.2.2.3.5.4.9.5.7.2 1.6.1 2.3.5.7.4 1.5.6 2.1.4.5-.1.8-.4 1-.8.5 0 1.1-.3 2-.3.6-.1 1.4.2 2.3.2 0 .1 0 .2.1.3.3.6.9.9 1.5.9.6-.1 1.3-.5 1.8-1.1.5-.6 1.4-.9 1.9-1.2.4-.2.6-.5.6-.8 0-.3-.2-.6-.6-1v-.1c-.1-.2-.2-.4-.3-.7-.1-.3-.1-.6-.4-.8-.1 0-.1-.1-.2-.1.3-1 .2-2-.1-2.9-.4-1.1-1.2-2.1-1.7-2.7-.6-.8-1.2-1.5-1.2-2.6C15.7 5.6 15.9 2 12.5 2z"/>
          <circle cx="10.4" cy="6.6" r=".9"/><circle cx="13.7" cy="6.6" r=".9"/>
        </svg>
        <span>linux</span>
        <span class="tip">Coming Soon!</span>
      </span>
    </div>

    <div class="stagearea">
      <div class="stage" id="stage" tabindex="0" role="button" aria-label="Switch screenshot">
        <div class="card" data-view="git">
          <img class="t-eink"  src="assets/shots/eink_git.png"  alt="The therefore git window.">
          <img class="t-space" src="assets/shots/space_git.png" alt="The therefore git window.">
          <span class="badge">git</span>
        </div>
        <div class="card" data-view="editor">
          <img class="t-eink"  src="assets/shots/eink_editor.png"  alt="The therefore editor.">
          <img class="t-space" src="assets/shots/space_editor.png" alt="The therefore editor.">
          <span class="badge">editor</span>
        </div>
      </div>
    </div>

    <p class="hint" id="hint">click the stack to see the git window</p>
    <p class="closing">Nothing else to explain. Designed to work.</p>

  </div>

<script>
  (function () {
    var root = document.documentElement;

    // Theme
    var btn = document.getElementById("toggle"), saved = null;
    try { saved = localStorage.getItem("therefore-theme"); } catch (e) {}
    if (!saved && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) saved = "space";
    if (saved) root.setAttribute("data-theme", saved);
    function themeLabel() { btn.textContent = root.getAttribute("data-theme") === "space" ? "eink" : "space"; }
    themeLabel();
    btn.addEventListener("click", function () {
      var next = root.getAttribute("data-theme") === "space" ? "eink" : "space";
      root.setAttribute("data-theme", next);
      try { localStorage.setItem("therefore-theme", next); } catch (e) {}
      themeLabel();
    });

    // Card stack
    var hint = document.getElementById("hint"), stage = document.getElementById("stage");
    function flip() {
      var next = root.getAttribute("data-front") === "editor" ? "git" : "editor";
      root.setAttribute("data-front", next);
      hint.textContent = next === "editor" ? "click the stack to see the git window"
                                           : "click the stack to see the editor";
    }
    stage.addEventListener("click", flip);
    stage.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " " || e.key === "ArrowLeft" || e.key === "ArrowRight") {
        e.preventDefault(); flip();
      }
    });

    // Size the stage to the largest image-shaped box that fits the space it's
    // given, so the card hugs the screenshot with no dead area around it.
    var area = document.querySelector(".stagearea"), AR = 3838 / 2098;
    function sizeStage() {
      if (window.matchMedia("(max-width:760px)").matches) { stage.style.width = ""; stage.style.height = ""; return; }
      // Leave room for the back card's 34px down-nudge (centred, so both
      // sides) so it can't poke into the text below on short screens.
      var w = area.clientWidth, h = area.clientHeight - 72;
      if (!w || h <= 0) return;
      var sw = Math.min(w, h * AR);
      stage.style.width = Math.round(sw) + "px";
      stage.style.height = Math.round(sw / AR) + "px";
    }
    sizeStage();
    window.addEventListener("resize", sizeStage);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(sizeStage);
    document.querySelectorAll(".card img").forEach(function (im) {
      if (!im.complete) im.addEventListener("load", sizeStage, { once: true });
    });
  })();
</script>
</body>
</html>
