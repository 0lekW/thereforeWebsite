<!doctype html>
<html lang="en" data-theme="eink">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>therefore — a text editor</title>
<meta name="description" content="therefore is a native text editor written in Rust and configured in Lua.">
<style>
  @font-face {
    font-family:"JetBrains Mono";
    src:url("assets/fonts/JetBrainsMono-Regular.ttf") format("truetype");
    font-weight:400; font-style:normal; font-display:swap;
  }
  @font-face {
    font-family:"JetBrains Mono";
    src:url("assets/fonts/JetBrainsMono-Bold.ttf") format("truetype");
    font-weight:600 700; font-style:normal; font-display:swap;
  }

  :root[data-theme="eink"]  { --bg:#f7f6f2; --fg:#23211e; --dim:#8a867e; --border:#c8c4ba; }
  :root[data-theme="space"] { --bg:#0b0e18; --fg:#c9cde4; --dim:#6b7290; --border:#2a3150; }

  * { box-sizing:border-box; }
  html { -webkit-text-size-adjust:100%; }
  body {
    margin:0; background:var(--bg); color:var(--fg);
    font-family:"JetBrains Mono",ui-monospace,"SF Mono",Consolas,monospace;
    font-size:15px; line-height:1.7;
    -webkit-font-smoothing:antialiased;
    transition:background .2s ease, color .2s ease;
  }
  .wrap { max-width:1000px; margin:0 auto; padding:0 28px; }

  header {
    display:flex; align-items:center; justify-content:space-between; padding:34px 0;
  }
  .brand { display:flex; align-items:baseline; gap:.5rem; text-decoration:none; color:inherit; }
  .brand .sym { color:var(--dim); letter-spacing:.15em; }
  .brand .name { font-size:1.05rem; }
  .toggle {
    background:none; border:1px solid var(--border); color:var(--dim);
    font-size:.72rem; letter-spacing:.05em; padding:.3rem .55rem; border-radius:3px; cursor:pointer;
  }
  .toggle:hover { color:var(--fg); border-color:var(--dim); }

  h1 { font-weight:600; font-size:2.3rem; margin:30px 0 .7rem; letter-spacing:-.01em; }
  h1 .sym { color:var(--dim); font-weight:400; }
  .intro { font-size:1.05rem; line-height:1.65; margin:0; max-width:60ch; }

  figure { margin:34px 0 0; }
  figure img {
    display:block; width:100%; height:auto;
    border:1px solid var(--border); border-radius:6px;
  }
  :root[data-theme="eink"]  .shot-space { display:none; }
  :root[data-theme="space"] .shot-eink  { display:none; }

  .closing {
    margin:40px 0 70px; color:var(--dim); font-size:1rem;
  }

  @media (max-width:600px) {
    h1 { font-size:1.9rem; }
  }
</style>
</head>
<body>
  <div class="wrap">

    <header>
      <a class="brand" href="/"><span class="sym">&#8756;</span><span class="name">therefore</span></a>
      <button class="toggle" id="toggle">space</button>
    </header>

    <h1>therefore <span class="sym">&#8756;</span></h1>
    <p class="intro">A text editor. Native, written in Rust, configured in Lua. Runs on Windows, macOS and Linux.</p>

    <figure>
      <img class="shot-eink"  src="assets/shots/eink_editor.png"  alt="The therefore editor.">
      <img class="shot-space" src="assets/shots/space_editor.png" alt="The therefore editor.">
    </figure>

    <figure>
      <img class="shot-eink"  src="assets/shots/eink_git.png"  alt="The therefore git window.">
      <img class="shot-space" src="assets/shots/space_git.png" alt="The therefore git window.">
    </figure>

    <p class="closing">Nothing else to explain. Designed to work.</p>

  </div>

<script>
  (function () {
    var root = document.documentElement, btn = document.getElementById("toggle"), saved = null;
    try { saved = localStorage.getItem("therefore-theme"); } catch (e) {}
    if (!saved && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) saved = "space";
    if (saved) root.setAttribute("data-theme", saved);
    function label() { btn.textContent = root.getAttribute("data-theme") === "space" ? "eink" : "space"; }
    label();
    btn.addEventListener("click", function () {
      var next = root.getAttribute("data-theme") === "space" ? "eink" : "space";
      root.setAttribute("data-theme", next);
      try { localStorage.setItem("therefore-theme", next); } catch (e) {}
      label();
    });
  })();
</script>
</body>
</html>
